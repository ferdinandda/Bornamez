<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TÍTULO DEL TEXTO | Bornamez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/articulo.css">
  </head>
  <body>

    <!-- Menú desplegable -->
    <div class="dropdown-menu" id="sideMenu">
      <nav class="dropdown-nav">
        <ul>
          <li><a href="/">Inicio</a></li>
          <li><a href="/editorial/">Editorial</a></li>
          <li><a href="/resena/">Reseña/Crítica</a></li>
          <li><a href="/poesia/">Poesía</a></li>
          <li><a href="/narrativa/">Narrativa</a></li>
          <li><a href="/ensayo/">Ensayo</a></li>
          <li><a href="/convocatoria/">Convocatoria</a></li>
        </ul>
      </nav>
    </div>

    <!-- Topbar -->
    <header class="masthead">
      <div class="header-left">
        <div class="header-emblems" id="menuBtn">
          <span class="hamburger-icon">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </div>
      </div>
      <div class="logo-wrapper">
        <a href="/" style="text-decoration:none">
          <div class="logo">
            <span>BORNA</span>
            <span>MEZ</span>
          </div>
        </a>
      </div>
      <div class="header-spacer"></div>
    </header>

    <!-- Contenido del artículo -->
    <main class="articulo-main">

      <span class="articulo-cat">SECCIÓN</span>
      <h1 class="articulo-titulo">Título del texto</h1>

      <div class="articulo-meta">
        <span class="articulo-autor">Nombre del autor</span>
      </div>

      <div class="articulo-cuerpo">
        <!-- PEGA EL TEXTO AQUÍ. Cada párrafo va dentro de <p> ... </p> -->
        <p>Primer párrafo del texto.</p>
        <p>Segundo párrafo del texto.</p>
      </div>

      <a href="/" class="articulo-volver">← Volver</a>
    </main>

    <script>
      const menuBtn = document.getElementById('menuBtn');
      const sideMenu = document.getElementById('sideMenu');
      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        menuBtn.classList.toggle('active');
        sideMenu.classList.toggle('active');
      });
      document.addEventListener('click', (e) => {
        if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
          sideMenu.classList.remove('active');
        }
      });
    </script>

  </body>
</html>
